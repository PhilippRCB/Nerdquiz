<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <title>Quiz</title>
    <link rel="stylesheet" th:href="@{/css/basicStyle.css}" />
</head>
<body>
    <h1>Willkommen zum Quiz!</h1>
    <p th:text="'Buzzer für Team ' + ${name} + '!'"></p>

    <form action="#" th:action="@{/quizMaster/upload}" method="post">
        <input type="text" th:disabled="${customUser}" th:hidden="${customUser}" name="quizJson" placeholder="Füge hier das Quiz im JSON-Format ein" required >
        <button type="submit">Hochladen</button>
    </form>

    <form action="#" th:action="@{/quizMaster/}" method="get">
        <button type="submit">Zurück</button>
    </form>
</body>
</html>
